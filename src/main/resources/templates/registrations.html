<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">🎫 Registrations</span>
        <a th:href="@{/organizer/dashboard}" class="btn btn-outline-light btn-sm">
            Back
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 th:text="'Registrations for: ' + ${event.title}"></h4>
        <a th:href="@{/organizer/events/{id}/export(id=${event.id})}"
           class="btn btn-secondary">
            📥 Export CSV
        </a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Registered At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reg, i : ${registrations}">
            <td th:text="${i.count}"></td>
            <td th:text="${reg.user.name}"></td>
            <td th:text="${reg.user.email}"></td>
            <td>
                <span th:class="${reg.status.name() == 'CONFIRMED'} ?
                      'badge bg-success' : 'badge bg-danger'"
                      th:text="${reg.status}"></span>
            </td>
            <td th:text="${reg.registeredAt}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(registrations)}"
         class="text-center text-muted mt-4">
        <h5>No registrations yet.</h5>
    </div>
</div>
</body>
</html>
