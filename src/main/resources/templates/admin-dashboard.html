<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">🛡️ Admin Dashboard</span>
        <div>
            <a th:href="@{/events}" class="btn btn-light btn-sm me-2">All Events</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body text-center">
                    <h2 th:text="${totalUsers}"></h2>
                    <p class="mb-0">Total Users</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h2 th:text="${totalEvents}"></h2>
                    <p class="mb-0">Total Events</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body text-center">
                    <h2 th:text="${totalRegistrations}"></h2>
                    <p class="mb-0">Total Registrations</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Users Table -->
    <div class="card mb-4">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">👥 All Users</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, i : ${users}">
                    <td th:text="${i.count}"></td>
                    <td>
                        <span th:text="${user.name}"></span>
                        <span th:if="${user.banned}" class="badge bg-danger ms-1">Banned</span>
                    </td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span th:class="${user.role.name() == 'ADMIN'} ? 'badge bg-danger' :
                                        (${user.role.name() == 'ORGANIZER'} ? 'badge bg-success' :
                                        'badge bg-primary')"
                              th:text="${user.role}"></span>
                    </td>
                    <td>
                        <form th:if="${!user.banned}"
                              th:action="@{/admin/users/{id}/ban(id=${user.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-warning btn-sm"
                                    onclick="return confirm('Ban this user?')">
                                🚫 Ban
                            </button>
                        </form>
                        <form th:if="${user.banned}"
                              th:action="@{/admin/users/{id}/unban(id=${user.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-success btn-sm">
                                ✅ Unban
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Events Table -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">📅 All Events</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Organizer</th>
                    <th>Date</th>
                    <th>Capacity</th>
                    <th>Registered</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event, i : ${events}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${event.title}"></td>
                    <td th:text="${event.organizer.name}"></td>
                    <td th:text="${event.eventDate}"></td>
                    <td th:text="${event.capacity}"></td>
                    <td th:text="${event.seatsfilled}"></td>
                    <td>
                        <form th:action="@{/admin/events/{id}/delete(id=${event.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Delete this event?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
