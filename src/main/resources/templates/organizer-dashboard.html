<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Organizer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">🎫 Organizer Dashboard</span>
        <div>
            <span class="text-white me-3" th:text="${currentUser.name}"></span>
            <a th:href="@{/events}" class="btn btn-light btn-sm me-2">All Events</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>My Events</h4>
        <a th:href="@{/organizer/events/new}" class="btn btn-success">
            + Create Event
        </a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-success">
        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Venue</th>
            <th>Capacity</th>
            <th>Registered</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td th:text="${event.title}"></td>
            <td th:text="${event.eventDate}"></td>
            <td th:text="${event.venue}"></td>
            <td th:text="${event.capacity}"></td>
            <td th:text="${event.seatsfilled}"></td>
            <td>
                <a th:href="@{/organizer/events/{id}/registrations(id=${event.id})}"
                   class="btn btn-info btn-sm">View</a>
                <a th:href="@{/organizer/events/{id}/export(id=${event.id})}"
                   class="btn btn-secondary btn-sm">Export CSV</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(events)}" class="text-center text-muted mt-4">
        <h5>No events created yet. Click "Create Event" to get started!</h5>
    </div>
</div>
</body>
</html>
