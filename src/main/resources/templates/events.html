<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🎫 Event Portal</span>
        <div>
            <span class="text-white me-3"
                  th:text="${currentUser.name}"></span>
            <a th:if="${currentUser.role.name() == 'ADMIN'}"
               th:href="@{/admin/dashboard}"
               class="btn btn-warning btn-sm me-2">Admin Dashboard</a>
            <a th:if="${currentUser.role.name() == 'ORGANIZER'}"
               th:href="@{/organizer/dashboard}"
               class="btn btn-light btn-sm me-2">My Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4>Upcoming Events</h4>

    <div th:if="${param.success}" class="alert alert-success">
        Successfully registered!
    </div>
    <div th:if="${param.error}" class="alert alert-danger"
         th:text="${param.error}"></div>

    <div class="row mt-3">
        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${event.title}"></h5>
                    <p class="text-muted" th:text="${event.description}"></p>
                    <p><strong>📍</strong> <span th:text="${event.venue}"></span></p>
                    <p><strong>📅</strong> <span th:text="${event.eventDate}"></span></p>
                    <p><strong>🪑</strong>
                        <span th:text="${event.capacity - event.seatsfilled}"></span>
                        seats left</p>
                </div>
                <div class="card-footer"
                     th:if="${currentUser.role.name() == 'STUDENT'}">
                    <div th:if="${!registrationService.isUserRegistered(currentUser, event)}">
                        <form th:action="@{/student/register/{id}(id=${event.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-primary btn-sm w-100"
                                    th:disabled="${event.seatsfilled >= event.capacity}">
                                Register
                            </button>
                        </form>
                    </div>
                    <div th:if="${registrationService.isUserRegistered(currentUser, event)}">
                        <button class="btn btn-success btn-sm w-100" disabled>
                            ✅ Registered
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(events)}" class="text-center text-muted mt-5">
        <h5>No events available yet.</h5>
    </div>
</div>
</body>
</html>
